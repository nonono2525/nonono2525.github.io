---
layout: default
---

<div id="cursor-glow"></div>

<section class="category-section" style="padding-top: 60px;">
  <h1>Category <span class="ko">카테고리</span></h1>
  <div class="category-grid" style="margin-top: 40px;">
    <a href="/category/dev/" class="category-block">개발</a>
    <a href="/category/ctf/" class="category-block">CTF/Wargame</a>
    <a href="/category/bugbounty/" class="category-block">Bug Bounty</a>
    <a href="/category/blog/" class="category-block">블로그/기술문서</a>
    <a href="/category/paper/" class="category-block">논문/컨퍼런스</a>
    <a href="/category/contest/" class="category-block">공모전/자격증</a>
  </div>
</section>

<script>
document.querySelectorAll('.category-block').forEach(block => {
  block.addEventListener('mouseenter', () => {
    block.style.transform = 'scale(1.08)';
    block.style.transition = 'transform 0.15s cubic-bezier(.36,2,.6,1)';
  });
  block.addEventListener('mouseleave', () => {
    block.style.transform = 'scale(1)';
  });
});
const glow = document.getElementById('cursor-glow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});
</script>
