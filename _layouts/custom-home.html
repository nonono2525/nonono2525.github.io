<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    

    body {
      background: #2d2d2d;
      color: #fff;
      font-family: sans-serif;
    }

    /* ── 네비게이션 ── */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      background: rgba(30,30,30,0.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      font-size: 0.95em;
    }
    .top-nav a { color: #fff; text-decoration: none; margin-left: 24px; }
    .top-nav a:first-child { margin-left: 0; font-weight: bold; }

    /* ── 스크롤 진행바 ── */
    #scroll-progress-bar {
      position: fixed;
      top: 43px; 
      left: 0;
      height: 3px;
      width: 0%;
      background: #4da6e8;
      z-index: 9999;
      transition: width 0.1s linear;
    }

    /* ── 커서 글로우 ── */
    #cursor-glow {
      pointer-events: none;
      position: fixed;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      z-index: 9998;
      transition: left 0.05s, top 0.05s;
    }

    /* ── 히어로 ── */
    .hero-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 120px 60px 60px;
      gap: 40px;
    }
    .hero-text h1 { font-size: 2.2em; font-weight: bold; line-height: 1.4; }
    .hero-text h1 em { font-style: italic; }
    .hero-text p { margin-top: 16px; line-height: 1.8; color: #ccc; font-size: 1.05em; }

    .profile-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #4da6e8;
      box-shadow: 0 0 24px rgba(77,166,232,0.6);
      flex-shrink: 0;
    }

    /* ── 구분선 ── */
    .section-divider {
      border: none;
      border-top: 1px solid #444;
      margin: 0 40px;
    }

    /* ── 카테고리 ── */
    .category-section { padding: 60px 60px; }
    .posts-section    { padding: 60px 60px; }

    .section-title {
      font-size: 2em;
      font-weight: bold;
      margin-bottom: 32px;
    }
    .section-title .ko {
      font-size: 0.5em;
      color: #aaa;
      font-weight: normal;
      margin-left: 8px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .category-block {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #4da6e8;
      color: #fff;
      font-size: 1.1em;
      font-weight: bold;
      border-radius: 12px;
      padding: 36px 10px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(.36,2,.6,1), box-shadow 0.2s;
    }
    .category-block:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 28px rgba(77,166,232,0.5);
      color: #fff;
      text-decoration: none;
    }

    /* ── 포스트 목록 ── */
    .post-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #333;
    }
    .post-item a { color: #fff; text-decoration: none; }
    .post-item a:hover { color: #4da6e8; }
    .post-date { color: #888; font-size: 0.85em; }
  </style>
</head>
<body>

<div id="scroll-progress-bar"></div>
<div id="cursor-glow"></div>

<!-- 네비게이션 -->
<nav class="top-nav">
  <a href="{{ '/' | relative_url }}">Home</a>
  <div>
    <a href="#category">Category</a>
    <a href="#posts">Post</a>
    <a href="{{ '/about/' | relative_url }}">about</a>
  </div>
</nav>

<!-- 히어로 -->
<section class="hero-section">
  <div class="hero-text">
    <h1>환영합니다 <em>nnn</em> 블로그입니다</h1>
    <p>이 블로그는 보안과 관련하여 기록하는<br>어쩌고저쩌고</p>
  </div>
  <img src="{{ '/assets/images/profile.jpg' | relative_url }}"
       alt="프로필 사진" class="profile-circle">
</section>

<hr class="section-divider">

<!-- 카테고리 -->
<section id="category" class="category-section">
  <h2 class="section-title">Category <span class="ko">카테고리</span></h2>
  <div class="category-grid">
    <a href="{{ '/category/dev/' | relative_url }}" class="category-block">개발</a>
    <a href="{{ '/category/ctf/' | relative_url }}" class="category-block">CTF/Wargame</a>
    <a href="{{ '/category/bugbounty/' | relative_url }}" class="category-block">Bug Bounty</a>
    <a href="{{ '/category/blog/' | relative_url }}" class="category-block">블로그/기술문서</a>
    <a href="{{ '/category/paper/' | relative_url }}" class="category-block">논문/컨퍼런스</a>
    <a href="{{ '/category/contest/' | relative_url }}" class="category-block">공모전/자격증</a>
  </div>
</section>

<hr class="section-divider">

<!-- 포스트 -->
<section id="posts" class="posts-section">
  <h2 class="section-title">Posts <span class="ko">게시물</span></h2>
  {% for post in site.posts limit:10 %}
  <div class="post-item">
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <span class="post-date">{{ post.date | date: "%Y.%m.%d" }}</span>
  </div>
  {% endfor %}
</section>

<script>
// 스크롤 진행바
const bar = document.getElementById('scroll-progress-bar');
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
  bar.style.width = pct + '%';
});

// 커서 글로우
const glow = document.getElementById('cursor-glow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});

// 부드러운 스크롤
document.querySelectorAll('a[href^="#"]').forEach(link => {
  link.addEventListener('click', e => {
    const target = document.getElementById(link.getAttribute('href').slice(1));
    if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth' }); }
  });
});
</script>

</body>
</html>
